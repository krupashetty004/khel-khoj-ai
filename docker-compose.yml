version: "3.9"

volumes:
  artifacts:
  uploads:

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env
    environment:
      - FASTAPI_BASE_URL=http://python-api:8000
      - UPLOAD_DIR=/uploads
      - PY_VIDEO_DIR=/artifacts/videos
    volumes:
      - uploads:/uploads
      - artifacts:/artifacts
    ports:
      - "5000:5000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles: ["dev", "prod-lite"]

  python-api:
    build:
      context: ./python-api
    env_file:
      - ./python-api/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - VIDEO_BASE_DIR=/artifacts/videos
      - ARTIFACTS_BASE_DIR=/artifacts
    volumes:
      - artifacts:/artifacts
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
    profiles: ["dev", "prod-lite"]

  celery-worker:
    build:
      context: ./python-api
    env_file:
      - ./python-api/.env
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/1
      - VIDEO_BASE_DIR=/artifacts/videos
      - ARTIFACTS_BASE_DIR=/artifacts
    volumes:
      - artifacts:/artifacts
    command: celery -A tasks worker --loglevel=info
    depends_on:
      redis:
        condition: service_healthy
    profiles: ["dev", "prod-lite"]

  frontend:
    build:
      context: ./my-next-app
    environment:
      - NEXT_PUBLIC_BACKEND_URL=http://backend:5000
      - NEXT_PUBLIC_FASTAPI_URL=http://python-api:8000
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      python-api:
        condition: service_healthy
    profiles: ["dev", "prod-lite"]
